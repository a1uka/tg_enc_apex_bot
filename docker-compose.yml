version: '3.8'
services:
  algs-bot:
    image: ghcr.io/a1uka/tg_enc_apex_bot:latest
    container_name: algs-telegram-bot
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - HTTP_PROXY=socks5://zapret-docker-proxy:1080
      - HTTPS_PROXY=socks5://zapret-docker-proxy:1080
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true