name: Deploy to server

on:
  push:
    branches: [ master ]   # или main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~
            REPO_URL="https://a1uka:${{ secrets.GIT_TOKEN }}@github.com/a1uka/tg_enc_apex_bot.git"
            
            # Если папки нет – клонируем
            if [ ! -d "tg_enc_apex_bot" ]; then
              echo "Cloning repository..."
              git clone $REPO_URL
            fi
            
            cd tg_enc_apex_bot
            
            # Обновляем код (если папка уже есть)
            git pull $REPO_URL master
            
            # Создаём .env с токеном бота
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env
            
            # Создаём папку для данных
            mkdir -p data
            
            # Логинимся в GHCR (чтобы скачать образ)
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u a1uka --password-stdin
            
            # Скачиваем последний образ
            docker pull ghcr.io/a1uka/tg_enc_apex_bot:latest
            
            # Перезапускаем контейнер
            docker-compose down
            docker-compose up -d