name: Deploy to server

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/a1uka/tg_enc_apex_bot:latest
            ghcr.io/a1uka/tg_enc_apex_bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~
            # Клонируем публичный репозиторий (без авторизации)
            if [ ! -d "tg_enc_apex_bot" ]; then
              git clone https://github.com/a1uka/tg_enc_apex_bot.git
            fi
            cd tg_enc_apex_bot
            git pull origin master

            # Создаём .env с токеном бота (секрет)
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env

            # Логин в GHCR для скачивания приватного образа
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u a1uka --password-stdin

            # Скачиваем новый образ
            docker pull ghcr.io/a1uka/tg_enc_apex_bot:latest

            # Перезапускаем контейнер
            docker-compose down
            docker-compose up -d