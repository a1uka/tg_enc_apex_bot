name: Deploy to server

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/a1uka/tg_enc_apex_bot:latest
            ghcr.io/a1uka/tg_enc_apex_bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Если папки нет – клонируем репозиторий (только чтобы получить docker-compose.yml и .env)
            cd ~
            if [ ! -d "tg_enc_apex_bot" ]; then
              git clone git@github.com:a1uka/tg_enc_apex_bot.git
            fi
            cd tg_enc_apex_bot

            # Обновляем код (чтобы получить актуальный docker-compose.yml, если он изменился)
            git pull origin master

            # Логинимся в GHCR (токен для чтения)
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u a1uka --password-stdin

            # Создаём .env (если нет)
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env

            # Скачиваем новый образ
            docker pull ghcr.io/a1uka/tg_enc_apex_bot:latest

            # Перезапускаем контейнер
            docker-compose down
            docker-compose up -d